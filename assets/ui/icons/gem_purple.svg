  <line x1="32" y1="28" x2="16" y2="52" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="28" x2="48" y2="52" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
  <!-- Sparkle shine -->
