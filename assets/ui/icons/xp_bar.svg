<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="xpbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- XP bar background -->
  <rect x="4" y="18" width="56" height="28" rx="14" ry="14" fill="#064e3b" stroke="#022c22" stroke-width="2.5"/>
  <!-- XP bar fill (70%) -->
  <rect x="6" y="20" width="38" height="24" rx="12" ry="12" fill="url(#xpbg)"/>
  <!-- Shine on bar -->
  <rect x="8" y="22" width="34" height="8" rx="4" ry="4" fill="white" opacity="0.2"/>
  <!-- XP text -->
  <text x="32" y="37" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="12" font-weight="900" fill="white" stroke="#022c22" stroke-width="0.6">XP</text>
  <!-- Plus icon -->
  <circle cx="52" cy="12" r="7" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
  <text x="52" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="900" fill="#92400e">+</text>
</svg>
