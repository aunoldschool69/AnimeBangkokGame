<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="4" y="12" width="192" height="48" rx="24" ry="24" fill="#92400e"/>
  <!-- Button body -->
  <rect x="4" y="8" width="192" height="48" rx="24" ry="24" fill="url(#pbg)" stroke="#78350f" stroke-width="3"/>
  <!-- Top shine -->
  <rect x="16" y="12" width="168" height="16" rx="8" ry="8" fill="white" opacity="0.25"/>
  <!-- Text -->
  <text x="100" y="40" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="#78350f" letter-spacing="2">PLAY</text>
</svg>
